<script>
    function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = String(s == null ? '' : s);
        return d.innerHTML.replace(/'/g, '&#39;');
    }
    function shortAddr(a) { return a ? `${a.slice(0, 6)}...${a.slice(-4)}` : ''; }
    function formatNum(n) { return new Intl.NumberFormat().format(n); }
    function formatTime(ts) {
        if (!ts) return '-';
        var diff = Math.floor((Date.now() - ts * 1000) / 1000);
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
    }
    function formatDate(ts) {
        if (!ts) return '-';
        return new Date(ts * 1000).toISOString().slice(0, 10);
    }
    function parseDomain(endpoint) {
        if (!endpoint) return null;
        try {
            const host = endpoint.replace(/^https?:\/\//, '').split(':')[0].split('/')[0];
            if (/^\d{1,3}(\.\d{1,3}){3}$/.test(host)) return host;
            const parts = host.split('.');
            if (parts.length >= 2) return parts.slice(-2).join('.');
            return host;
        } catch (_e) { return null; }
    }
    function providerLink(addr, endpoint) {
        var label = parseDomain(endpoint) || shortAddr(addr);
        return `<a href="/compute/providers/${encodeURIComponent(addr)}">${escHtml(label)}</a>`;
    }
    function isTesting(morPerDay) { return parseFloat(morPerDay) < 1; }
    function computeDur10(morPerDay) {
        var sf = (window._stakingFactor || 0.00315);
        var ppd = parseFloat(morPerDay);
        if (ppd <= 0) return '-';
        var mins = Math.round(((10 * sf) / ppd) * 1440);
        if (mins >= 60) return Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
        return mins + 'm';
    }

    var MODEL_IC = '<svg class="model-ic" viewBox="0 0 16 16" fill="none" stroke="#22d3ee" stroke-width="1.3" aria-hidden="true"><rect x="3.5" y="3.5" width="9" height="9"/><rect x="6" y="6" width="4" height="4" stroke-opacity=".55"/><path d="M5.5 1v2.5M8 1v2.5M10.5 1v2.5M5.5 12.5V15M8 12.5V15M10.5 12.5V15M1 5.5h2.5M1 8h2.5M1 10.5h2.5M12.5 5.5H15M12.5 8H15M12.5 10.5H15"/></svg>';

    // Fill the 30-day window day by day so quiet days render as gaps, not lies.
    function demandBars(daily) {
        var byDay = {};
        (daily || []).forEach(function (d) { byDay[d.day] = Number(d.sessions) || 0; });
        var days = [];
        var now = Date.now();
        for (var i = 29; i >= 0; i--) {
            var key = new Date(now - i * 86400000).toISOString().slice(0, 10);
            days.push({ day: key, sessions: byDay[key] || 0 });
        }
        var max = Math.max.apply(null, days.map(function (d) { return d.sessions; }));
        if (max <= 0) return null;
        var total = days.reduce(function (a, d) { return a + d.sessions; }, 0);
        var bars = days.map(function (d) {
            var h = d.sessions > 0 ? Math.max(4, Math.round((d.sessions / max) * 100)) : 0;
            var cls = d.sessions > 0 ? 'spark-bar' : 'spark-bar zero';
            return `<div class="${cls}" style="height:${h}%" title="${d.day}: ${formatNum(d.sessions)} session${d.sessions === 1 ? '' : 's'}"></div>`;
        }).join('');
        return {
            total: total,
            html: `<div class="spark" role="img" aria-label="Daily sessions, last 30 days: ${formatNum(total)} total">${bars}</div>` +
                `<div class="spark-axis" aria-hidden="true"><span>${days[0].day}</span><span>${days[29].day}</span></div>`
        };
    }

    function renderDetail(data) {
        var root = document.getElementById('model-detail-root');
        if (!data || !data.model) {
            root.innerHTML = '<div class="empty-msg">Model not found.</div>';
            return;
        }
        var m = data.model;
        var s = data.summary || {};
        if (s.stakingFactor) window._stakingFactor = s.stakingFactor;
        var name = m.name || shortAddr(m.modelId);
        var successRate = (s.totalSessions > 0 && s.successSessions != null)
            ? ((s.successSessions / s.totalSessions) * 100).toFixed(1) : null;

        var html = '';

        // Header
        html += '<div class="detail-header">';
        html += `<div class="detail-title">${MODEL_IC}<h1 class="detail-name">${escHtml(name)}</h1></div>`;
        html += '<div class="detail-address">';
        html += `<span>${escHtml(m.modelId)}</span>`;
        html += `<button type="button" class="copy-id" id="copy-model-id" aria-label="Copy model id">Copy</button>`;
        html += '</div>';
        var since = m.createdAt ? `Registered ${formatDate(m.createdAt)} (${formatTime(m.createdAt)})` : '';
        var tags = (m.tags || []).map(function (t) { return `<span class="tag-chip">${escHtml(t)}</span>`; }).join('');
        if (since || tags) html += `<div class="detail-since">${tags}${escHtml(since)}</div>`;
        var famCount = ((data.family || {}).variants || []).length;
        html += `<div class="listing-note">One listing on the on-chain model registry; any provider can bid to serve it.${famCount > 1 ? ' Other listings of this model appear in the family below.' : ''}</div>`;
        if (m.description) html += `<p class="model-desc">${escHtml(m.description)}</p>`;
        html += '</div>';

        // Stats row
        html += '<div class="stats-row">';
        html += `<div class="stat-item"><span class="stat-val cyan">${formatNum(s.providers || 0)}</span><span class="stat-label">Providers</span></div>`;
        html += `<div class="stat-item"><span class="stat-val">${formatNum(s.activeBids || 0)}</span><span class="stat-label">Active Bids</span></div>`;
        html += `<div class="stat-item"><span class="stat-val green">${formatNum(s.totalSessions || 0)}</span><span class="stat-label">Sessions (indexed)</span></div>`;
        html += `<div class="stat-item"><span class="stat-val green">${formatNum(s.activeSessions || 0)}</span><span class="stat-label">Active Now</span></div>`;
        html += `<div class="stat-item"><span class="stat-val">${formatNum(s.uniqueUsers || 0)}</span><span class="stat-label">Consumers</span></div>`;
        html += `<div class="stat-item"><span class="stat-val">${successRate != null ? successRate + '%' : '-'}</span><span class="stat-label">Success Rate</span></div>`;
        html += '</div>';

        // Market card: the ask spread across live bids
        if ((s.activeBids || 0) > 0 && s.minAskMorPerHour != null) {
            var cheapest = (data.bids || [])[0] || {};
            html += '<div class="card">';
            html += '<div class="card-title">Current Asks</div>';
            html += '<div class="ask-grid">';
            html += `<div class="ask-item"><span class="ask-val">${escHtml(parseFloat(s.minAskMorPerHour).toFixed(4))}</span><span class="ask-label">Cheapest MOR/hr</span></div>`;
            if (s.medianAskMorPerHour != null) html += `<div class="ask-item"><span class="ask-val">${escHtml(parseFloat(s.medianAskMorPerHour).toFixed(4))}</span><span class="ask-label">Median MOR/hr</span></div>`;
            html += `<div class="ask-item"><span class="ask-val">${cheapest.hourlyStake ? formatNum(cheapest.hourlyStake) : '\u2014'}</span><span class="ask-label">Lock 1hr (cheapest)</span></div>`;
            html += `<div class="ask-item"><span class="ask-val">${escHtml(computeDur10(cheapest.priceMorPerDay || '0'))}</span><span class="ask-label">10 MOR gets</span></div>`;
            html += '</div></div>';
        }

        // Demand: last 30 days
        var spark = demandBars(data.dailySessions);
        if (spark) {
            html += '<div class="card">';
            html += `<div class="card-title">Sessions, Last 30 Days (${formatNum(spark.total)})</div>`;
            html += spark.html;
            html += '</div>';
        }

        // Family: every flavor, and what the whole family has done overall
        var fam = data.family || {};
        var variants = fam.variants || [];
        if (variants.length > 1) {
            var famName = fam.key ? fam.key.charAt(0).toUpperCase() + fam.key.slice(1) : 'Model';
            var tot = fam.totals || {};
            var morUsd = window.__MOR_USD__ || 0;
            var stakeNum = parseFloat(tot.totalStakeMor || '0');
            var usdStr = morUsd > 0 && stakeNum > 0
                ? `<span class="fam-usd">&asymp;&nbsp;$${formatNum(Math.round(stakeNum * morUsd))}</span>` : '';
            html += '<div class="card">';
            html += `<div class="card-title">The ${escHtml(famName)} Family (${variants.length} listings)</div>`;
            html += '<div class="fam-meta">';
            if (fam.firstSeen) html += `<span>First on scene ${formatDate(fam.firstSeen)} (${formatTime(fam.firstSeen)})</span>`;
            if (fam.teeAvailable) html += '<span class="fam-badge tee">TEE available</span>';
            if (fam.webAvailable) html += '<span class="fam-badge web">Web-search flavors</span>';
            html += '</div>';
            html += '<div class="fam-totals">';
            html += `<div class="ask-item"><span class="ask-val" style="color:var(--green)">${formatNum(tot.totalSessions || 0)}</span><span class="ask-label">Sessions Overall</span></div>`;
            html += `<div class="ask-item"><span class="ask-val" style="color:var(--cyan)">${formatNum(tot.providerCount || 0)}</span><span class="ask-label">Providers Overall</span></div>`;
            html += `<div class="ask-item"><span class="ask-val">${formatNum(Math.round(stakeNum))} MOR${usdStr}</span><span class="ask-label">Staked Overall</span></div>`;
            html += `<div class="ask-item"><span class="ask-val" style="color:var(--text-primary)">${formatNum(tot.uniqueUsers || 0)}</span><span class="ask-label">Consumers Overall</span></div>`;
            html += '</div>';
            html += '<div class="table-scroll" style="margin:0 -1.25rem -1rem;padding:0 1.25rem 1rem;"><table class="fam-table"><thead><tr>';
            html += '<th>Flavor</th><th class="num">First Seen</th><th class="num">Sessions</th><th class="num">Staked MOR</th><th class="num">Bids</th><th>Runs As</th>';
            html += '</tr></thead><tbody>';
            variants.forEach(function (v) {
                var vname = v.name || shortAddr(v.modelId);
                var badges = (v.tee ? '<span class="fam-badge tee">TEE</span> ' : '') + (v.web ? '<span class="fam-badge web">WEB</span>' : '');
                html += `<tr${v.isCurrent ? ' class="variant-current"' : ''}>`;
                html += `<td class="variant-name"><a href="/compute/models/${encodeURIComponent(v.modelId)}">${escHtml(vname)}</a>${v.isCurrent ? '<span class="you">(this page)</span>' : ''}</td>`;
                html += `<td class="num" style="color:var(--text-muted)">${formatDate(v.createdAt)}</td>`;
                html += `<td class="num" style="color:${v.totalSessions > 0 ? 'var(--green)' : 'var(--text-muted)'}">${formatNum(v.totalSessions || 0)}</td>`;
                html += `<td class="num">${formatNum(Math.round(parseFloat(v.stakeMor || '0')))}</td>`;
                html += `<td class="num" style="color:${v.activeBids > 0 ? 'var(--text-secondary)' : 'var(--text-muted)'}">${formatNum(v.activeBids || 0)}</td>`;
                html += `<td>${badges || '<span style="color:var(--text-muted)">\u2014</span>'}</td>`;
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            html += '</div>';
        }

        // Current bids
        var bids = data.bids || [];
        html += `<div class="section-title">Current Bids (${bids.length})</div>`;
        if (bids.length > 0) {
            html += '<div class="card" style="padding:0;overflow:hidden;">';
            html += '<div class="table-scroll bids-table-wrap"><table class="bids-table"><thead><tr>';
            html += '<th>Provider</th><th class="num">Lock 1hr</th><th class="num">10 MOR gets</th><th class="num">Sessions</th><th>Status</th><th class="num">Since</th>';
            html += '</tr></thead><tbody>';
            bids.forEach(function (bid) {
                var testing = isTesting(bid.priceMorPerDay);
                var active = bid.activeSessions || 0;
                html += '<tr>';
                html += `<td class="provider-name">${providerLink(bid.provider, bid.providerEndpoint)}</td>`;
                html += `<td class="num"><span class="price">${bid.hourlyStake ? formatNum(bid.hourlyStake) : '\u2014'} MOR</span></td>`;
                html += `<td class="num" style="color:var(--text-muted)">${escHtml(computeDur10(bid.priceMorPerDay))}</td>`;
                html += `<td class="num" style="color:${active > 0 ? 'var(--green);font-weight:600' : 'var(--text-muted)'}">${active > 0 ? active + ' active' : formatNum(bid.totalSessions || 0)}</td>`;
                html += `<td><span class="badge ${testing ? 'badge-testing' : 'badge-production'}">${testing ? 'Testing' : 'Prod'}</span></td>`;
                html += `<td class="num" style="color:var(--text-muted)">${formatTime(bid.createdAt)}</td>`;
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            html += '<div class="bid-cards">';
            bids.forEach(function (bid) {
                var testing = isTesting(bid.priceMorPerDay);
                var active = bid.activeSessions || 0;
                html += '<div class="bid-card">';
                html += `<div class="bid-card-provider">${providerLink(bid.provider, bid.providerEndpoint)}</div>`;
                html += `<div class="bid-card-row"><span>Lock 1hr:</span><span class="bid-card-price">${bid.hourlyStake ? formatNum(bid.hourlyStake) : '\u2014'} MOR</span></div>`;
                html += `<div class="bid-card-row"><span>10 MOR gets:</span><span>${escHtml(computeDur10(bid.priceMorPerDay))}</span></div>`;
                html += `<div class="bid-card-row"><span>Sessions:</span><span style="color:${active > 0 ? 'var(--green)' : 'var(--text-muted)'};font-weight:600">${active > 0 ? active + ' active' : formatNum(bid.totalSessions || 0)}</span></div>`;
                html += `<div class="bid-card-row"><span>Status:</span><span class="badge ${testing ? 'badge-testing' : 'badge-production'}">${testing ? 'Testing' : 'Prod'}</span></div>`;
                html += '</div>';
            });
            html += '</div>';
            html += '</div>';
        } else {
            // Explain the quiet listing: who has served it and how recently, so
            // "0 active bids" beside a real session history reads as retracted
            // supply, not broken data.
            var servedBy = (data.providers || []).length;
            var msg = 'No active bids on this listing right now, so new sessions cannot be opened on it.';
            if (servedBy > 0) {
                msg += ` ${formatNum(servedBy)} provider${servedBy === 1 ? ' has' : 's have'} served it`;
                if (s.lastSession) msg += `; the last session opened ${formatTime(s.lastSession)}`;
                msg += '.';
            }
            html += `<div class="empty-msg">${msg}</div>`;
        }

        // Providers serving this model (reputation)
        var providers = data.providers || [];
        if (providers.length > 0) {
            html += '<div class="section-title">Providers Serving This Model</div>';
            html += '<div class="card" style="padding:0;overflow:hidden;">';
            html += '<div class="table-scroll"><table class="providers-table"><thead><tr><th>Provider</th><th class="num">Sessions</th><th class="num">Success</th><th class="num">Disputes</th><th class="num">Success Rate</th></tr></thead><tbody>';
            providers.forEach(function (r) {
                html += '<tr>';
                html += `<td class="provider-name">${providerLink(r.provider, r.endpoint)}</td>`;
                html += `<td class="num">${formatNum(r.totalSessions || 0)}</td>`;
                html += `<td class="num" style="color:var(--green)">${formatNum(r.successCount || 0)}</td>`;
                html += `<td class="num" style="color:${(r.disputeCount || 0) > 0 ? 'var(--yellow)' : 'var(--text-muted)'}">${r.disputeCount || 0}</td>`;
                html += `<td class="num">${r.successRate != null ? escHtml(r.successRate) + '%' : '-'}</td>`;
                html += '</tr>';
            });
            html += '</tbody></table></div></div>';
        }

        // Recent sessions
        var sessions = data.recentSessions || [];
        html += `<div class="section-title">Recent Sessions (${Math.min(sessions.length, 20)})</div>`;
        if (sessions.length > 0) {
            sessions.slice(0, 20).forEach(function (sess) {
                var badgeClass = sess.isActive ? 'badge-active' : (sess.closeoutType === 1 ? 'badge-dispute' : 'badge-closed');
                var badgeText = sess.isActive ? 'Active' : (sess.closeoutType === 1 ? 'Dispute' : 'Closed');
                html += '<div class="session-item">';
                html += '<div class="session-row">';
                html += `<span class="session-user"><a href="/compute/consumers/wallet/${encodeURIComponent(sess.user)}" style="color:var(--cyan)">${escHtml(shortAddr(sess.user))}</a></span>`;
                html += `<span class="badge ${badgeClass}">${badgeText}</span>`;
                html += '</div>';
                html += '<div class="session-meta">';
                html += `<span>via ${providerLink(sess.provider, sess.providerEndpoint)}</span>`;
                html += `<span style="color:var(--mor)">${escHtml(sess.stakeMor)} MOR</span>`;
                html += `<span style="margin-left:auto">${formatTime(sess.openedAt)}</span>`;
                html += '</div></div>';
            });
        } else {
            html += '<div class="empty-msg">No sessions indexed for this model yet.</div>';
        }

        root.innerHTML = html;

        var copyBtn = document.getElementById('copy-model-id');
        if (copyBtn && navigator.clipboard) {
            copyBtn.addEventListener('click', function () {
                navigator.clipboard.writeText(m.modelId).then(function () {
                    copyBtn.textContent = 'Copied';
                    setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1400);
                }).catch(function () {});
            });
        } else if (copyBtn) {
            copyBtn.style.display = 'none';
        }
    }

    (() => {
        var data = window.__MODEL_DATA__;
        if (data) {
            renderDetail(data);
        } else {
            document.getElementById('model-detail-root').innerHTML = '<div class="empty-msg">No data available.</div>';
        }
    })();
</script>
