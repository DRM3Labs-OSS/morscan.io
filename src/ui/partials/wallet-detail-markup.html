<!-- Wallet Detail - content fragment for layout.mustache -->
<style>
    .back-link { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 1.5rem; display: inline-block; }
    .back-link:hover { color: var(--cyan); }

    .detail-header { margin-bottom: 1.5rem; }
    .detail-address { font-size: 0.9rem; color: var(--cyan); font-weight: 600; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .detail-address a { color: var(--link); font-size: 0.75rem; }
    .detail-address a:hover { color: #a5f3fc; text-decoration: underline; }
    .copy-btn {
        background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 0.2rem 0.4rem;
        font-size: 0.75rem; cursor: pointer; font-family: inherit;
    }
    .copy-btn:hover { border-color: var(--green); color: var(--green); }

    .stats-row {
        display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem;
        padding: 0.75rem 1rem; background: var(--bg-secondary); border: 1px solid var(--border);
    }
    .stat-item { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; min-width: 100px; }
    .stat-val { font-size: 1rem; font-weight: 700; }
    .stat-val.green { color: var(--green); }
    .stat-val.cyan { color: var(--cyan); }
    .stat-val.mor { color: var(--mor); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .card { background: var(--bg-secondary); border: 1px solid var(--border); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .card-title { font-size: 0.75rem; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.75rem; }

    .bal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; }
    .bal-item { display: flex; flex-direction: column; gap: 0.1rem; }
    .bal-val { font-size: 1.1rem; font-weight: 700; }
    .bal-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* Sessions list */
    .session-item { background: var(--bg-secondary); border: 1px solid var(--border); padding: 0.6rem 0.75rem; margin-bottom: 0.35rem; }
    .session-row { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .session-model { font-size: 0.75rem; font-weight: 500; color: var(--text-primary); }
    .session-meta { display: flex; gap: 0.75rem; font-size: 0.75rem; color: var(--text-muted); align-items: center; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 0.15rem 0.4rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }
    .badge-active { background: var(--green-dim); color: var(--green); }
    .badge-closed { background: rgba(168,162,158,0.1); color: var(--text-muted); }
    .badge-claimable { background: var(--orange-dim); color: var(--orange); }

    .section-title { font-size: 0.75rem; color: var(--green); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.75rem; margin-top: 1.5rem; }
    .empty-msg { padding: 1rem; font-size: 0.75rem; color: var(--text-muted); }
    .loading { display: flex; justify-content: center; align-items: center; padding: 3rem; color: var(--text-muted); flex-direction: column; gap: 1rem; }
    .loading-spinner { width: 40px; height: 40px; position: relative; }
    .loading-spinner::before { content: ''; position: absolute; inset: 0; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Role sections (unified wallet profile) */
    .role-row { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; flex-wrap: wrap; padding: 0.45rem 0; border-bottom: 1px solid rgba(68,64,60,0.35); font-size: 0.75rem; }
    .role-row:last-child { border-bottom: none; }
    .role-tag { display: inline-block; padding: 0.12rem 0.4rem; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; background: var(--green-dim); color: var(--green); margin-left: 0.4rem; }
    .role-meta { color: var(--text-muted); font-size: 0.75rem; }

    /* Verified-owner badge (client-injected; the page itself is edge-cached) */
    .owner-badge { display: inline-flex; align-items: center; gap: 0.45rem; border: 1px solid var(--green); color: var(--green); padding: 0.22rem 0.6rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; background: rgba(34,197,94,0.07); box-shadow: 0 0 12px rgba(34,197,94,0.28), inset 0 0 8px rgba(34,197,94,0.10); animation: badge-in 0.4s ease-out; white-space: nowrap; }
    .owner-badge svg { display: block; flex: none; }
    .owner-badge .owner-caps { color: var(--text-muted); font-weight: 500; text-transform: none; letter-spacing: 0; border-left: 1px solid var(--border); padding-left: 0.45rem; }
    @keyframes badge-in { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }

    @media (max-width: 640px) {
        .stats-row { flex-direction: column; gap: 0.75rem; }
        .bal-grid { grid-template-columns: 1fr 1fr; }
    }
</style>

<a href="/compute/consumers" class="back-link">&larr; Back to Consumers</a>

<div id="wallet-detail-root">
    <div style="padding:1rem 0;"><div class="skeleton skel-line w60"></div><div class="skeleton skel-line w40"></div><div class="skel-row"><div class="skeleton skel-card"></div><div class="skeleton skel-card"></div></div><div class="skeleton skel-table-row"></div><div class="skeleton skel-table-row"></div><div class="skeleton skel-table-row"></div></div>
</div>
