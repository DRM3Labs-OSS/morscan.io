<!-- Universal wallet badge: a fixed upper-right connected-wallet menu for pages
     that do NOT use the plane header (landing, console, stake, about, etc.). It
     mirrors the plane header's wallet menu (src/ui/layout.mustache) but is fully
     self-contained (own colors, no page-specific CSS vars) so it renders the same
     on every standalone page. Populated client-side from /console/wallet/status
     (no-store). Self-suppresses on any page that already has the plane header slot
     (#hdr-wallet) so the menu never doubles. -->
<style>
  .mw-badge { position: fixed; top: 0.8rem; right: 0.85rem; z-index: 200; font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  .mw-badge * { box-sizing: border-box; }
  .mw-menu { position: relative; }
  .mw-trigger { display: inline-flex; align-items: center; gap: 0.45rem; background: rgba(12,10,9,0.94); border: 1px solid #44403c; color: #e7e5e4; padding: 0.42rem 0.62rem; min-height: 34px; cursor: pointer; font-size: 0.75rem; font-family: inherit; }
  .mw-trigger:hover, .mw-trigger:focus-visible, .mw-trigger[aria-expanded="true"] { border-color: #22c55e; color: #fafaf9; }
  .mw-dot { width: 7px; height: 7px; background: #22c55e; box-shadow: 0 0 6px #22c55e; flex: 0 0 auto; }
  .mw-addr { font-variant-numeric: tabular-nums; }
  .mw-caret { transition: transform 0.15s; }
  .mw-trigger[aria-expanded="true"] .mw-caret { transform: rotate(180deg); }
  .mw-connect { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(12,10,9,0.94); border: 1px solid #44403c; color: #e7e5e4; padding: 0.42rem 0.65rem; min-height: 34px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; text-decoration: none; }
  .mw-connect:hover, .mw-connect:focus-visible { border-color: #22c55e; color: #22c55e; }
  .mw-pop { position: absolute; right: 0; top: calc(100% + 6px); min-width: 13rem; background: #1c1917; border: 1px solid #22c55e; box-shadow: 0 10px 30px rgba(0,0,0,0.6); padding: 0.3rem; display: flex; flex-direction: column; }
  .mw-pop[hidden] { display: none; }
  .mw-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #b8b3ae; padding: 0.45rem 0.55rem 0.15rem; }
  .mw-id { font-size: 0.75rem; color: #e7e5e4; padding: 0 0.55rem 0.5rem; margin-bottom: 0.25rem; border-bottom: 1px solid #44403c; word-break: break-all; font-variant-numeric: tabular-nums; }
  .mw-item { font-family: inherit; text-align: left; background: transparent; border: none; color: #e7e5e4; font-size: 0.75rem; padding: 0 0.55rem; min-height: 40px; display: flex; align-items: center; cursor: pointer; text-decoration: none; }
  .mw-item:hover, .mw-item:focus-visible { background: #14352a; color: #22c55e; outline: none; }
  .mw-disc:hover, .mw-disc:focus-visible { color: #f87171; background: rgba(248,113,113,0.12); }
  .mw-trigger:focus-visible, .mw-connect:focus-visible, .mw-item:focus-visible { outline: 2px solid #22c55e; outline-offset: 2px; }
  @media (max-width: 768px) { .mw-badge { top: 0.6rem; right: 0.6rem; } .mw-trigger, .mw-connect { font-size: 0.75rem; padding: 0.4rem 0.5rem; } }
</style>
<div class="mw-badge" id="mw-badge" role="status" aria-live="polite"></div>
<script>
(function(){
  var slot = document.getElementById('mw-badge');
  if (!slot) return;
  // Pages with the plane header already render the wallet menu there.
  if (document.getElementById('hdr-wallet')) { slot.parentNode && slot.parentNode.removeChild(slot); return; }
  var CARET = '<svg class="mw-caret" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true" focusable="false"><path d="M1 3.2 5 7l4-3.8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>';
  var ICON = '<svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true" focusable="false"><rect x="1.5" y="4" width="13" height="8.5"/><path d="M1.5 6.5h13" stroke-opacity=".55"/><circle cx="11.8" cy="9.8" r="0.85" fill="currentColor" stroke="none"/></svg>';
  function wire(trig, pop){
    function items(){ return Array.prototype.slice.call(pop.querySelectorAll('[role="menuitem"]')); }
    function onKey(e){ if(e.key==='Escape'){e.preventDefault();close(true);return;} var it=items(),i=it.indexOf(document.activeElement); if(e.key==='ArrowDown'){e.preventDefault();it[(i+1)%it.length].focus();} else if(e.key==='ArrowUp'){e.preventDefault();it[i<=0?it.length-1:i-1].focus();} }
    function outside(e){ if(!pop.contains(e.target)&&e.target!==trig&&!trig.contains(e.target)) close(false); }
    function open(){ pop.hidden=false;trig.setAttribute('aria-expanded','true');var it=items();if(it.length)it[0].focus();document.addEventListener('mousedown',outside);document.addEventListener('keydown',onKey); }
    function close(f){ pop.hidden=true;trig.setAttribute('aria-expanded','false');document.removeEventListener('mousedown',outside);document.removeEventListener('keydown',onKey);if(f)trig.focus(); }
    trig.addEventListener('click', function(){ pop.hidden ? open() : close(true); });
    trig.addEventListener('keydown', function(e){ if((e.key==='ArrowDown'||e.key==='Enter'||e.key===' ')&&pop.hidden){e.preventDefault();open();} });
  }
  fetch('/console/wallet/status', { cache: 'no-store' }).then(function(r){ return r.json(); }).then(function(d){
    if (d && d.wallet) {
      var a = String(d.wallet), short = a.slice(0,6) + '...' + a.slice(-4);
      var menu = document.createElement('div'); menu.className = 'mw-menu';
      var trig = document.createElement('button'); trig.type = 'button'; trig.className = 'mw-trigger';
      trig.setAttribute('aria-haspopup','menu'); trig.setAttribute('aria-expanded','false');
      trig.setAttribute('aria-label','Wallet ' + short + ', open wallet menu');
      trig.innerHTML = '<span class="mw-dot" aria-hidden="true"></span><span class="mw-addr">' + short + '</span>' + CARET;
      var pop = document.createElement('div'); pop.className = 'mw-pop'; pop.setAttribute('role','menu'); pop.hidden = true;
      var lbl = document.createElement('div'); lbl.className = 'mw-label'; lbl.textContent = 'Wallet connected';
      var idl = document.createElement('div'); idl.className = 'mw-id'; idl.textContent = a; idl.title = a;
      var con = document.createElement('a'); con.className = 'mw-item'; con.setAttribute('role','menuitem'); con.href = '/console'; con.textContent = 'Console';
      var disc = document.createElement('button'); disc.type = 'button'; disc.className = 'mw-item mw-disc'; disc.setAttribute('role','menuitem'); disc.textContent = 'Disconnect wallet';
      disc.addEventListener('click', function(){ disc.disabled = true; fetch('/console/wallet/disconnect', { method: 'POST', cache: 'no-store' }).then(function(){ location.href = '/'; }).catch(function(){ location.href = '/'; }); });
      pop.appendChild(lbl); pop.appendChild(idl); pop.appendChild(con); pop.appendChild(disc);
      menu.appendChild(trig); menu.appendChild(pop); wire(trig, pop); slot.appendChild(menu);
    } else {
      var link = document.createElement('a'); link.className = 'mw-connect'; link.href = '/console';
      link.setAttribute('aria-label','Connect wallet'); link.innerHTML = ICON + '<span>Connect</span>';
      slot.appendChild(link);
    }
  }).catch(function(){});
})();
</script>
