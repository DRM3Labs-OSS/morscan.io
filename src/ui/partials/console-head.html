<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Console - MorScan</title>
  <meta property="og:title" content="Console - MorScan">
  <meta property="og:description" content="Connect your wallet for a free MorScan API key. No email, no signup.">
  <meta property="og:image" content="{{BASE_URL}}/og-image.png">
  <meta property="og:url" content="{{BASE_URL}}/console">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="MorScan">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{BASE_URL}}/og-image.png">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/morscan-icon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <!-- IBM Plex Mono self-hosted at /fonts/ (SIL OFL 1.1, src/fonts/OFL.txt) - fleet console convention, no third-party font host. -->
  <style>
    @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/fonts/ibm-plex-mono-400.woff2') format('woff2'); }
    @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 500; font-display: swap; src: url('/fonts/ibm-plex-mono-500.woff2') format('woff2'); }
    @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 600; font-display: swap; src: url('/fonts/ibm-plex-mono-600.woff2') format('woff2'); }
    @font-face { font-family: 'IBM Plex Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url('/fonts/ibm-plex-mono-700.woff2') format('woff2'); }

    /* House law: rendered JSON is ALWAYS syntax-highlighted. */
    .jk { color: var(--cyan, #22d3ee); }
    .js { color: #a9c1a0; }
    .jn { color: #e0af68; }
    .jb { color: #bb9af7; }
  </style>
  <style>
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0; }
    :root { /* IBM Plex Mono self-hosted (fleet console convention). REVERT = remove the @font-face block + restore: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace */ --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace; --bg: #0c0a09; --bg2: #1c1917; --border: #44403c; --text: #fafaf9; --sub: #d6d3d1; --muted: #c7c2bc; --green: #22c55e; --green-dim: rgba(34,197,94,0.15); --cyan: #22d3ee; --red: #f87171; --amber: #fbbf24; }
    html, body { overflow-x: hidden; }
    body { font-family: var(--mono); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.55; }
    .page { max-width: 680px; margin: 0 auto; padding: 3rem 1.25rem 4rem; }
    .back { font-size: 0.7rem; color: var(--green); text-decoration: none; }
    h1 { font-size: 1.5rem; color: var(--green); margin: 1.6rem 0 0.3rem; }
    .who { font-size: 0.72rem; color: var(--muted); margin-bottom: 1.6rem; overflow-wrap: anywhere; }
    .card { border: 1px solid var(--border); background: var(--bg2); padding: 1.3rem 1.3rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7rem; }
    .keybox { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .keyval { flex: 1 1 150px; min-width: 0; font-size: 0.74rem; color: var(--cyan); background: var(--bg); border: 1px solid var(--border); padding: 0.6rem 0.75rem; overflow-x: auto; white-space: nowrap; }
    /* min-height 40px keeps every action at a comfortable mobile tap target */
    .btn { font-family: inherit; font-size: 0.68rem; font-weight: 600; padding: 0.55rem 0.9rem; min-height: 40px; cursor: pointer; border: 1px solid var(--green); background: none; color: var(--green); }
    .btn.solid { background: var(--green); color: var(--bg); }
    .btn.big { font-size: 0.78rem; padding: 0.75rem 1.4rem; }
    .btn.danger { border-color: var(--red); color: var(--red); }
    /* Disconnect is not destructive (the key keeps working) - quiet secondary, not red. */
    .btn.secondary { border-color: var(--border); color: var(--sub); }
    .btn.secondary:hover { border-color: var(--muted); color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .note { font-size: 0.65rem; color: var(--muted); margin-top: 0.7rem; line-height: 1.6; }
    .msg { font-size: 0.66rem; margin-top: 0.6rem; min-height: 1em; }
    .msg.ok { color: var(--green); } .msg.err { color: var(--red); }
    a { color: var(--green); text-decoration: none; }
    /* Inline prose links carry an underline so they are distinguishable without relying on color */
    .note a, .connect-copy a { text-decoration: underline; text-underline-offset: 2px; }
    :focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }
    /* Skip link - visually hidden until keyboard focus */
    .skip-link { position: absolute; left: -9999px; top: 0; z-index: 100; background: var(--green); color: var(--bg); font-weight: 700; font-size: 0.8rem; padding: 0.6rem 1rem; text-decoration: none; }
    .skip-link:focus { left: 0.5rem; top: 0.5rem; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
    }
    .links { font-size: 0.68rem; margin-top: 1.4rem; }
    .links a { margin-right: 0.9rem; }
    .kicker { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted, var(--sub)); margin: 2rem 0 0.5rem; }
    .connect-hero { text-align: left; padding: 0.5rem 0; }
    .connect-hero h1 { margin-top: 0; }
    .connect-copy { font-size: 0.74rem; color: var(--sub); max-width: 460px; margin: 0.6rem auto 1.4rem; line-height: 1.7; }
    .wallet-choices { display: flex; flex-direction: column; gap: 0.5rem; max-width: 340px; margin: 0.8rem auto 0; }
    .wallet-choices .btn { width: 100%; }
    .caps-strip { display: inline-flex; gap: 0; border: 1px solid var(--border); margin: 0 0 1.4rem; font-size: 0.65rem; }
    .caps-strip span { padding: 0.4rem 0.8rem; color: var(--sub); border-right: 1px solid var(--border); }
    .caps-strip span:last-child { border-right: none; }
    .caps-strip strong { color: var(--green); }
    /* Public vs Connected comparison: what connecting buys over the free public UI */
    .vs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.55rem; max-width: 460px; margin: 0 0 1.4rem; }
    .vs-col { border: 1px solid var(--border); background: var(--bg); padding: 0.7rem 0.8rem; }
    .vs-col.vs-hi { border-color: var(--green); }
    .vs-h { font-size: 0.7rem; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; }
    .vs-col.vs-hi .vs-h { color: var(--green); }
    .vs-sub { font-size: 0.58rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 0.15rem; }
    .vs-list { list-style: none; margin: 0.55rem 0 0; padding: 0; }
    .vs-list li { font-size: 0.63rem; color: var(--sub); line-height: 1.5; padding-left: 0.95rem; position: relative; margin-bottom: 0.28rem; }
    .vs-list li::before { content: '+'; position: absolute; left: 0; color: var(--muted); font-weight: 700; }
    .vs-list li.vs-yes { color: var(--green); }
    .vs-list li.vs-yes::before { content: '+'; color: var(--green); }
    .vs-list li.vs-no { color: var(--muted); }
    .vs-list li.vs-no::before { content: 'x'; color: var(--muted); }
    /* Stake tier table: real caps from capsForStake, mono + tabular, scroll-safe */
    .tiers { max-width: 460px; margin: 1.6rem 0 0; }
    .tiers-h { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .tier-scroll { overflow-x: auto; }
    .tier-table { border-collapse: collapse; width: 100%; font-size: 0.62rem; font-variant-numeric: tabular-nums; }
    .tier-table th, .tier-table td { border: 1px solid var(--border); padding: 0.4rem 0.55rem; text-align: right; white-space: nowrap; }
    .tier-table th:first-child, .tier-table td:first-child { text-align: left; }
    .tier-table thead th { color: var(--muted); font-weight: 600; font-size: 0.57rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .tier-table td { color: var(--sub); }
    .tier-table td:first-child { color: var(--text); }
    .tier-table tbody tr:first-child td { color: var(--green); }
    @media (max-width: 380px) { .vs { grid-template-columns: 1fr; } }
    .wstat { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 0.4rem; }
    .wstat > div { background: var(--bg); padding: 0.6rem 0.8rem; }
    .wstat .v { display: block; font-size: 0.82rem; font-weight: 700; color: var(--green); font-variant-numeric: tabular-nums; }
    .wstat .l { display: block; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.15rem; }
    .addr { font-size: 0.72rem; color: var(--cyan); overflow-wrap: anywhere; }
    /* Shared price widget wrapper (widget styles ship in src/ui/price-widget.html) */
    .mkt-wrap { width: 100%; max-width: 420px; margin: 1.8rem auto 0; }
    /* Secondary key sign-in */
    .keyalt { max-width: 420px; margin: 1.4rem auto 0; text-align: center; }
    .keyalt-toggle { background: none; border: none; color: var(--muted); font-family: inherit; font-size: 0.66rem; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; letter-spacing: 0.03em; padding: 0.3rem; }
    .keyalt-toggle:hover { color: var(--green); }
    .keyalt-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--cyan); padding: 0.65rem 0.8rem; font-family: inherit; font-size: 0.74rem; text-align: center; }
    /* Usage & limits panel */
    .usage-row { margin-bottom: 0.9rem; }
    .usage-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; }
    .usage-label { font-size: 0.66rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.08em; }
    .usage-count { font-size: 0.72rem; color: var(--text); font-variant-numeric: tabular-nums; }
    .usage-count .cap { color: var(--muted); }
    .bar { height: 6px; background: var(--bg); border: 1px solid var(--border); margin-top: 0.35rem; overflow: hidden; }
    .bar-fill { height: 100%; width: 0; background: var(--green); transition: width 0.3s ease; }
    .bar-fill.near { background: var(--amber); }
    .bar-fill.over { background: var(--red); }
    .usage-rate { font-size: 0.72rem; color: var(--sub); margin-top: 0.2rem; }
    .usage-rate strong { color: var(--text); font-variant-numeric: tabular-nums; }
    /* Capacity drawdown demo */
    code { font-family: inherit; color: var(--cyan); }
    .curlbox { display: flex; gap: 0.5rem; align-items: stretch; margin-top: 0.9rem; }
    .curl { flex: 1; min-width: 0; font-size: 0.72rem; color: var(--cyan); background: var(--bg); border: 1px solid var(--border); padding: 0.6rem 0.75rem; overflow-x: auto; white-space: nowrap; line-height: 1.5; }
    .cap-readout { margin-top: 1rem; display: grid; gap: 0.85rem; }
    .cap-metric-head { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; }
    .cap-metric-label { font-size: 0.66rem; color: var(--sub); text-transform: uppercase; letter-spacing: 0.08em; }
    .cap-metric-val { font-size: 0.82rem; color: var(--green); font-variant-numeric: tabular-nums; font-weight: 700; }
    .cap-metric-val .cap-left { font-size: 0.6rem; color: var(--muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.06em; }
    .cap-metric-val .cap-of { font-size: 0.66rem; color: var(--muted); font-weight: 400; }
    /* Remaining bar: green normally, amber near empty, red when spent. Width = remaining/limit. */
    .cap-readout .bar-fill { width: 100%; }
    .cap-status { font-size: 0.68rem; margin-top: 0.9rem; min-height: 1.1em; line-height: 1.55; }
    .cap-status.pending { color: var(--muted); }
    .cap-status.ok { color: var(--green); }
    .cap-status.err { color: var(--red); }
    .cap-json { font-size: 0.68rem; color: var(--sub); background: var(--bg); border: 1px solid var(--border); padding: 0.6rem 0.75rem; margin-top: 0.6rem; overflow-x: auto; white-space: pre; max-height: 240px; overflow-y: auto; line-height: 1.5; }
    .cap-json:empty { display: none; }
    /* Themed confirm modal (no native dialogs - in-page overlay) */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(12,10,9,0.78); display: none; align-items: center; justify-content: center; padding: 1.25rem; z-index: 50; }
    .modal-card { width: 100%; max-width: 400px; background: var(--bg2); border: 1px solid var(--green); padding: 1.4rem 1.3rem 1.2rem; text-align: left; box-shadow: 0 0 0 1px rgba(34,197,94,0.15), 0 20px 50px rgba(0,0,0,0.55); }
    .modal-card h3 { font-size: 0.82rem; color: var(--green); letter-spacing: 0.04em; margin-bottom: 0.55rem; }
    .modal-msg { font-size: 0.72rem; color: var(--sub); line-height: 1.6; margin-bottom: 1.1rem; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  </style>
</head>
