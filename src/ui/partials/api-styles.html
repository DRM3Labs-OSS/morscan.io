<!-- API Playground - content fragment for layout.mustache -->
<style>
  /*
   * Swagger dark theme is injected dynamically AFTER swagger-ui.css loads.
   * See SWAGGER_DARK_CSS constant in the script block below.
   * Only non-swagger styles go here.
   */

  /* Layout */
  .api-grid { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 1.5rem; }
  @media (max-width: 900px) {
    .api-grid { grid-template-columns: 1fr; gap: 1rem; }
    .api-sidebar { order: 1; }
    .api-panel { order: 2; }
    .ep-list { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .ep-desc { display: none; }
  }
  @media (max-width: 500px) { .ep-list { grid-template-columns: 1fr; } }

  /* Tabs */
  .api-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .api-tab {
    padding: 0.5rem 1rem; font-size: 0.75rem; cursor: pointer; font-family: inherit;
    background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-muted);
  }
  .api-tab.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }

  /* Key bar */
  .key-bar {
    background: var(--bg-secondary); border: 1px solid var(--border);
    padding: 0.5rem 1rem; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; font-size: 0.7rem;
  }
  .key-input {
    flex: 1; min-width: 200px; max-width: 400px;
    background: var(--bg-primary); border: 1px solid var(--border); color: var(--cyan);
    padding: 0.3rem 0.5rem; font-family: inherit; font-size: 0.7rem;
  }
  .key-input:focus { border-color: var(--green); outline: none; }

  /* Sidebar */
  .ep-group-title {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em;
    color: var(--text-muted); margin: 0.75rem 0 0.35rem; padding-left: 0.25rem;
  }
  .ep-group-title:first-child { margin-top: 0; }
  .ep-list { display: flex; flex-direction: column; gap: 0.35rem; }
  .ep-item {
    background: var(--bg-secondary); border: 1px solid var(--border);
    padding: 0.5rem 0.6rem; cursor: pointer; transition: all 0.15s;
  }
  .ep-item:hover { background: var(--bg-card); }
  .ep-item.active { border-color: var(--green); background: var(--green-dim); }
  .ep-row { display: flex; align-items: center; gap: 0.4rem; }
  .ep-method { font-weight: 600; font-size: 0.65rem; padding: 0.1rem 0.3rem; }
  .ep-method.get { color: var(--green); background: var(--green-dim); }
  .ep-method.post { color: var(--yellow); background: rgba(250,204,21,0.2); }
  .ep-path { color: var(--cyan); font-size: 0.7rem; }
  .ep-desc { color: var(--text-muted); font-size: 0.65rem; margin-top: 0.15rem; }

  /* Panels */
  .api-panel { display: flex; flex-direction: column; gap: 1rem; min-width: 0; }
  .pnl { background: var(--bg-secondary); border: 1px solid var(--border); overflow: hidden; }
  .pnl-hdr {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); background: var(--bg-card);
  }
  .pnl-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .pnl-meta { display: flex; gap: 1rem; font-size: 0.7rem; }
  .pnl-meta .st { color: var(--green); font-weight: 600; }
  .pnl-meta .st.err { color: var(--red); }
  .pnl-meta .tm { color: var(--yellow); }
  .pnl-meta .sz { color: var(--purple); }

  /* Buttons */
  .btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted);
    padding: 0.25rem 0.5rem; font-size: 0.65rem; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--green-dim); color: var(--green); border-color: var(--green); }
  .btn.copied { background: var(--green); color: var(--bg-primary); }
  .btn-run {
    background: var(--green); color: var(--bg-primary); border: 1px solid var(--green);
    font-weight: 600; font-size: 0.75rem; padding: 0.5rem 1.5rem;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-run:hover { background: #16a34a; }
  .btn-run:disabled { opacity: 0.5; cursor: wait; }

  /* Request controls */
  .req-bar {
    display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;
    padding: 0.75rem 1rem; border-bottom: 1px solid var(--border);
  }
  .req-url {
    flex: 1; min-width: 0; background: var(--bg-primary); border: 1px solid var(--border);
    padding: 0.5rem 0.75rem; font-size: 0.7rem; color: var(--cyan);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: inherit;
  }
  .req-url:focus { border-color: var(--green); outline: none; }
  @media (max-width: 500px) {
    .req-bar { flex-direction: column; align-items: stretch; }
    .req-url { font-size: 0.65rem; white-space: normal; word-break: break-all; }
    .btn-run { width: 100%; }
  }

  /* Code blocks */
  .code { padding: 0.75rem 1rem; font-size: 0.7rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; overflow-x: auto; max-height: 60vh; overflow-y: auto; }
  .code::-webkit-scrollbar { width: 6px; height: 6px; }
  .code::-webkit-scrollbar-thumb { background: var(--border); }
  .code::-webkit-scrollbar-track { background: transparent; }

  /* Syntax colors */
  .jk { color: var(--cyan); }
  .js { color: var(--green); }
  .jn { color: var(--orange); }
  .jb { color: var(--purple); }
  .jl { color: var(--text-muted); }
  .hk { color: var(--purple); }
  .hv { color: var(--text-secondary); }

  /* Terminology */
  .term-box { background: var(--bg-secondary); border: 1px solid var(--border); padding: 0.75rem; margin-top: 0.75rem; font-size: 0.65rem; color: var(--text-muted); }
  .term-box b { color: var(--text-primary); font-weight: 600; }
  .term-def { margin-bottom: 0.25rem; }

  /* Curl section */
  .curl-section {
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem; font-size: 0.65rem; line-height: 1.6;
    white-space: pre-wrap; word-break: break-all; color: var(--text-secondary);
  }

  .resp-hdrs { display: block; padding: 0.5rem 1rem; font-size: 0.65rem; line-height: 1.5; white-space: pre-wrap; color: var(--text-muted); border-top: 1px solid var(--border); }

  /* Live capacity strip - the connected wallet's stake, its rate caps, and the
     live remaining budget. Populated from /mor/v1/capacity, then updated straight
     from each metered response's X-RateLimit-* headers so a RUN visibly ticks
     the per-minute budget down. */
  .cap-strip { display: flex; flex-wrap: wrap; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 1rem; }
  .cap-cell { flex: 1 1 130px; background: var(--bg-secondary); padding: 0.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
  .cap-lbl { color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; font-size: 0.58rem; }
  .cap-val { color: var(--text-primary); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 0.7rem; }
  .cap-val.warn { color: var(--yellow); }
  .cap-note { flex: 1 1 100%; background: var(--bg-secondary); padding: 0.4rem 0.75rem; color: var(--text-muted); font-size: 0.62rem; line-height: 1.5; }
  .cap-note b { color: var(--green); font-weight: 600; }

  /* FREE vs METERED badges - sidebar rows + the request panel header. */
  .ep-meter { margin-left: auto; font-size: 0.55rem; font-weight: 700; letter-spacing: 0.04em; padding: 0.05rem 0.3rem; white-space: nowrap; flex: 0 0 auto; }
  .req-meter { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.1rem 0.45rem; }
  .ep-meter.free, .req-meter.free { color: var(--green); background: var(--green-dim); }
  .ep-meter.metered, .req-meter.metered { color: var(--yellow); background: rgba(250,204,21,0.16); }
  .ep-meter.dual, .req-meter.dual { color: var(--cyan); background: rgba(34,211,238,0.14); }
</style>
